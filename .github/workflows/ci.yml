name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Backend build (only if exists)
      - name: Check backend
        run: |
          if [ -f "backend/pom.xml" ]; then
            echo "Backend found, building..."
            cd backend
            mvn clean install
          else
            echo "No backend yet, skipping..."
          fi

      # Frontend build (only if exists)
      - name: Check frontend
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "Frontend found, building..."
            cd frontend
            npm install
            npm run build
          else
            echo "No frontend yet, skipping..."
          fi
