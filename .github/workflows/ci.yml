name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Backend ---
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Or '17' depending on your project
          distribution: 'temurin'

      - name: Test Backend
        run: mvn -B test --file backend/smart-campus-api/pom.xml

      # --- Frontend ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Modern LTS Node version

      - name: Build Frontend
          working-directory: ./frontend
          run: npm install && npm run build
